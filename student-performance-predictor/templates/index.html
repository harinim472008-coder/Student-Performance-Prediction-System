<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Performance Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
    <main class="container">
        <section class="card hero">
            <h1>Student Performance Prediction</h1>
        </section>

        <section class="grid">
            <div class="card">
                <h2>Input Details</h2>
                <form id="predictionForm">
                    <label for="attendance">Attendance (%)</label>
                    <input id="attendance" name="attendance" type="number" min="0" max="100" step="0.1" required />

                    <label for="study_hours">Study Hours / Day</label>
                    <input id="study_hours" name="study_hours" type="number" min="0" max="24" step="0.1" required />

                    <label for="previous_grades">Previous Grade (%)</label>
                    <input id="previous_grades" name="previous_grades" type="number" min="0" max="100" step="0.1" required />

                    <button type="submit">Predict</button>
                </form>
            </div>

            <div class="card">
                <h2>Prediction Result</h2>
                <div id="result" class="result empty">
                    Submit student details to view prediction.
                </div>
                <h3 class="chart-title">Prediction Graph</h3>
                <canvas id="predictionChart" width="420" height="240"></canvas>
            </div>
        </section>

        <section class="card">
            <h2>Dataset Mean Graph</h2>
            <canvas id="summaryChart" width="900" height="280"></canvas>
        </section>

        <section class="card">
            <h2>Dataset Summary</h2>
            <div id="summary" class="summary-grid">
                <p>Loading model statistics...</p>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
